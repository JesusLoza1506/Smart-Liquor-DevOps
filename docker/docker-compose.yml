version: "3.8"

services:
  # VOLVEMOS A CREAR LA DB LOCAL PARA NO DEPENDER DE NADIE
  db:
    image: postgres:15-alpine
    container_name: liquor_db
    environment:
      POSTGRES_USER: admin_licores
      POSTGRES_PASSWORD: password_seguro
      POSTGRES_DB: liquor_store
    ports:
      - "5432:5432"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: liquor_app
    ports:
      - "8502:8502"
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - db  # La app ahora espera a la DB local
    volumes:
      - ..:/app